name: Deploy to kazpar.pl

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-kazpar-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          # Normalize possible CRLF line endings from secret storage.
          printf "%s" "${{ secrets.KAZPAR_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -p 1024 kazpar.pl >> ~/.ssh/known_hosts

      - name: Run remote deploy script
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p 1024 -o StrictHostKeyChecking=yes root@kazpar.pl "/usr/local/bin/fmdx-deploy.sh"
